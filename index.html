<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="profile-container">
        <header class="header-banner">
            <img src="banner.jpg" alt="Header Banner">
        </header>
        <div class="profile-info">
            <img src="profile.jpg" alt="Profile Picture" class="profile-img">
            <h1 class="profile-name">Anime Character Name</h1>
            <span class="verification-badge">✔️ Verified</span>
            <p class="bio">This is a bio section where the character description goes.</p>
            <button class="edit-profile">Edit Profile</button>
        </div>
        <div class="stats">
            <span class="followers">123 Followers</span>
            <span class="following">456 Following</span>
            <span class="tweets">789 Tweets</span>
        </div>
        <nav class="navigation-tabs">
            <button class="tab">Posts</button>
            <button class="tab">Media</button>
            <button class="tab">Likes</button>
        </nav>
        <section class="pinned-posts">
            <h2>Pinned Posts</h2>
            <div class="post">This is a pinned post content.</div>
            <div class="post">Another pinned post.</div>
        </section>
    </div>
</body>
</html>
